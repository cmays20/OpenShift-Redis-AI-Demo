apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oauth
  namespace: openshift-gitops
spec:
  ignoreDifferences:
    - group: user.openshift.io
      kind: Group
      name: cluster-admins
      jsonPointers:
        - /users
  destination:
    server: 'https://kubernetes.default.svc'
  project: default
  source:
    path: OAuth-Setup
    repoURL: 'https://github.com/cmays20/OpenShift-Redis-AI-Demo.git'
    targetRevision: HEAD
  syncPolicy:
    automated:
      selfHeal: true