apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gpu-instances
  namespace: openshift-gitops
spec:
  destination:
    server: 'https://kubernetes.default.svc'
  project: default
  source:
    path: GPU-instance/machine-sets/aggregate
    repoURL: 'https://github.com/cmays20/OpenShift-Redis-AI-Demo.git'
    targetRevision: cluster2
  syncPolicy:
    automated:
      selfHeal: true