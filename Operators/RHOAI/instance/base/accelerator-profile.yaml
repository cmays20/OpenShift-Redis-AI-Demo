apiVersion: infrastructure.opendatahub.io/v1
kind: HardwareProfile
metadata:
  name: nvidia-gpu
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  identifiers:
    - defaultCount: 1
      displayName: nvidia.com/gpu
      identifier: nvidia.com/gpu
      maxCount: 1
      minCount: 1
      resourceType: Accelerator
    - defaultCount: 2
      displayName: cpu
      identifier: cpu
      maxCount: '8'
      minCount: 1
      resourceType: CPU
    - defaultCount: 4Gi
      displayName: memory
      identifier: memory
      maxCount: 24Gi
      minCount: 2Gi
      resourceType: Memory
  scheduling:
    node:
      nodeSelector: { }
      tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Equal
          value: 'true'
    type: Node