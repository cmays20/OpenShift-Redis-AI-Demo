apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base/

patches:
  - target:
      group: cert-manager.io
      version: v1
      kind: Certificate
    patch: |-
      - op: replace
        path: /spec/commonName
        value: '*.apps.mays-demo.sandbox3060.opentlc.com'
      - op: replace
        path: /spec/dnsNames/0
        value: '*.apps.mays-demo.sandbox3060.opentlc.com'

